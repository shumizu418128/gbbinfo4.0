name: Convert R2 images to WebP

on:
  schedule:
    # JST 03:00 = UTC 18:00
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scripts/r2/package-lock.json

      - name: Install R2 WebP script dependencies
        working-directory: scripts/r2
        run: npm ci

      - name: Convert R2 images to WebP
        run: scripts/r2/node_modules/.bin/tsx scripts/r2/convert-to-webp.ts
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
