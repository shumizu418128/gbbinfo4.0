map $http_user_agent $block_bot {
    default           0;
    ""                1;
    ~*python-requests 1;
    ~*python/         1;
    ~*scrapy          1;
    ~*^curl/          1;
    ~*wget            1;
    ~*Go-http-client  1;
    ~*java/           1;
    ~*libwww-perl     1;
    ~*HttpClient      1;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=participant:10m rate=15r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Render プロキシ経由の CF-Connecting-IP をクライアント IP として扱う。
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    real_ip_header CF-Connecting-IP;

    if ($block_bot) {
        return 403;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        text/xml
        application/xml
        image/svg+xml;

    # 出場者詳細は巡回スクレイピングの主対象のため、一般より厳しめに制限する。
    location ~ ^/(ja|en|de|ko)/participant/ {
        limit_req zone=participant burst=10 nodelay;
        try_files $uri $uri/ $uri.html @404;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # 拡張子なし URL（例: /ja/2026/top）をディレクトリ index.html へ解決する。
    location / {
        limit_req zone=general burst=40 nodelay;
        try_files $uri $uri/ $uri.html @404;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # 存在しない URL は言語別 404 ページへフォールバックする。
    location @404 {
        rewrite ^/(ja|en|de|ko)(/.*)?$ /$1/404/ last;
        rewrite ^ /ja/404/ last;
    }

    # ハッシュ付きの静的アセットは長期キャッシュ可能。
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
