server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 拡張子なし URL（例: /ja/2026/top）をディレクトリ index.html へ解決する。
    location / {
        try_files $uri $uri/ $uri.html @404;
    }

    # 存在しない URL は言語別 404 ページへフォールバックする。
    location @404 {
        rewrite ^/(ja|en|de|ko)(/.*)?$ /$1/404/ last;
        rewrite ^ /ja/404/ last;
    }

    # ハッシュ付きの静的アセットは長期キャッシュ可能。
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
