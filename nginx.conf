server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        text/xml
        application/xml
        image/svg+xml;

    # 拡張子なし URL（例: /ja/2026/top）をディレクトリ index.html へ解決する。
    location / {
        try_files $uri $uri/ $uri.html @404;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # 存在しない URL は言語別 404 ページへフォールバックする。
    location @404 {
        rewrite ^/(ja|en|de|ko)(/.*)?$ /$1/404/ last;
        rewrite ^ /ja/404/ last;
    }

    # ハッシュ付きの静的アセットは長期キャッシュ可能。
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
